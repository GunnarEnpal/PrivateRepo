name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'one-sided-dashboard/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: one-sided-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: one-sided-dashboard
        run: npm install

      - name: Build
        working-directory: one-sided-dashboard
        run: npm run build
        env:
          VITE_AIRTABLE_TOKEN: ${{ secrets.VITE_AIRTABLE_TOKEN }}
          VITE_MAKE_WEBHOOK: ${{ secrets.VITE_MAKE_WEBHOOK }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: one-sided-dashboard/dist
