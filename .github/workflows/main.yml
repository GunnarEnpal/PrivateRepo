name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'TERMINATIONS/one-sided-dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TERMINATIONS/one-sided-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: TERMINATIONS/one-sided-dashboard
        run: npm install

      - name: Build
        working-directory: TERMINATIONS/one-sided-dashboard
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: TERMINATIONS/one-sided-dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
